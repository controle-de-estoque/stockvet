<div class="flex flex-row w-screen justify-between">

  <div class="flex flex-col items-center justify-center w-1/2">

    <img src="logo-stockvet.png" alt="stockvet logo" class="h-40">

    <form [formGroup]="form" class="flex flex-col gap-1.5">
      <div class="flex flex-col text-center mb-6 gap-4">
        <h1 class="font-semibold text-4xl">StockVet</h1>
        <h2>Portal do cliente: Juntos pelo bem estar</h2>
      </div>

      <div class="flex flex-col">
        <label for="email" class="text-sm">E-mail</label>
        <input formControlName="email" id="email" name="email" type="text" placeholder="Digite seu e-mail"
        class="bg-white border border-black rounded-sm py-1 px-2 text-sm focus:outline-none">
        <p class="text-red-600 italic text-[12px]" [ngClass]="{'hidden': shouldHideErrorFieldMessage('email')}">Campo obrigatório</p>
      </div>

      <div class="flex flex-col">
        <label for="animalEstimacao" class="text-sm">Nome do primeiro animal de estimação</label>
        <input formControlName="animalEstimacao" id="animalEstimacao" name="animalEstimacao" type="text" placeholder="Nome do seu pet"
        class="bg-white border border-black rounded-sm py-1 px-2 text-sm focus:outline-none">
        <p class="text-red-600 italic text-[12px]" [ngClass]="{'hidden': shouldHideErrorFieldMessage('animalEstimacao')}">Campo obrigatório</p>
      </div>

      <div class="flex flex-col">
        <label for="senha" class="text-sm">Senha</label>
        <input formControlName="senha" id="senha" name="senha" type="password" placeholder="Informe a nova senha"
        class="bg-white border border-black rounded-sm py-1 px-2 text-sm focus:outline-none">
        <p class="text-red-600 italic text-[12px]" [ngClass]="{'hidden': shouldHideErrorFieldMessage('senha')}">Campo obrigatório</p>
      </div>

      <button type="submit" (click)="redefinir()" class="w-full self-center bg-[#2A56F2] text-white font-bold rounded-2xl py-1 my-4 border border-[#2A56F2] hover:bg-white hover:text-[#2A56F2] transition-all duration-300 hover:cursor-pointer">redefinir senha</button>

      <div class="flex flex-col items-center gap-1">
        <a routerLink="/login" class="text-sm underline italic">Já tem uma conta? Faça login</a>
        <a routerLink="/cadastro" class="text-sm underline italic">Ainda não tem uma conta? Cadastre-se</a>
      </div>
    </form>

  </div>

  <img src="imagem-login.png" alt="" class="w-1/2 h-screen object-cover object-left">

</div>
