<div class="flex flex-col w-full md:max-w-[80%] mx-auto gap-12 p-4 md:p-0">
  <app-navbar></app-navbar>

  <div class="w-full bg-white rounded-lg shadow-sm p-6 sm:p-10 border border-gray-100">
    <h2 class="text-2xl font-bold text-gray-900 mb-8">Cadastrar produto</h2>

    <form class="space-y-6" (submit)="cadastrarProduto()">
      <div>
        <label for="nome" class="block text-sm font-semibold text-gray-900 mb-2">Nome</label>
        <input
          type="text"
          id="nome"
          name="nome"
          [(ngModel)]="nome"
          placeholder="Digite aqui o nome do produto ..."
          class="w-full border border-gray-800 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
          required
        >
      </div>

      <div>
        <label for="quantidade_critica" class="block text-sm font-semibold text-gray-900 mb-2">Quantidade crítica</label>
        <input
          type="number"
          id="quantidade_critica"
          min="1"
          step="1"
          placeholder="Digite aqui a quantidade crítica ..."
          class="w-full border border-gray-800 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
          required
        >
      </div>

      <div>
        <div class="flex justify-between items-end mb-2">
          <label for="unidade" class="block text-sm font-semibold text-gray-900">Unidade</label>
          <a routerLink="/cadastrar-unidade" class="text-sm font-medium text-blue-600 hover:text-blue-800 hover:underline transition-colors hover:cursor-pointer">+ Adicionar unidade</a>
        </div>
        <div class="relative">
          <select
            id="unidade"
            name="unidade"
            [(ngModel)]="unidadeId"
            class="w-full border border-gray-800 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 appearance-none bg-white transition-colors cursor-pointer"
            required
          >
            <option value="" disabled selected>Selecione uma unidade ...</option>
            @for (unidade of unidades(); track unidade.uuid) {
              <option [value]="unidade.uuid">{{ unidade.nome }}</option>
            }
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-700">
            <svg class="h-4 w-4 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
              <path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" />
            </svg>
          </div>
        </div>
      </div>

      <div>
        <div class="flex justify-between items-end mb-2">
          <label for="categoria" class="block text-sm font-semibold text-gray-900">Categoria</label>
          <a routerLink="/cadastrar-categoria" class="text-sm font-medium text-blue-600 hover:text-blue-800 hover:underline transition-colors hover:cursor-pointer">+ Adicionar categoria</a>
        </div>
        <div class="relative">
          <select
            id="categoria"
            name="categoria"
            [(ngModel)]="categoriaId"
            class="w-full border border-gray-800 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 appearance-none bg-white transition-colors cursor-pointer"
            required
          >
            <option value="" disabled selected>Selecione uma categoria ...</option>
            @for (categoria of categorias(); track categoria.uuid) {
              <option [value]="categoria.uuid">{{ categoria.nome }}</option>
            }
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-700">
            <svg class="h-4 w-4 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
              <path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" />
            </svg>
          </div>
        </div>
      </div>

      <div>
        <label for="tipo" class="block text-sm font-semibold text-gray-900 mb-2">Tipo</label>
        <div class="relative">
          <select
            id="tipo"
            name="tipo"
            [(ngModel)]="tipo"
            class="w-full border border-gray-800 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 appearance-none bg-white transition-colors cursor-pointer"
            required
          >
            <option value="" disabled selected>Selecione um tipo ...</option>
            <option value="consumo">Consumo</option>
            <option value="patrimonio">Patrimônio</option>
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-700">
            <svg class="h-4 w-4 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
              <path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" />
            </svg>
          </div>
        </div>
      </div>

      <div class="flex flex-col sm:flex-row gap-4 pt-4">
        <button
          type="button"
          class="flex-1 px-6 py-3 bg-gray-100 text-gray-700 font-semibold rounded-md hover:bg-gray-200 transition-colors hover:cursor-pointer"
          routerLink="/produtos"
        >
          Voltar
        </button>
        <button
          type="submit"
          class="flex-1 px-6 py-3 bg-indigo-600 text-white font-semibold rounded-md hover:bg-indigo-700 shadow-sm transition-colors hover:cursor-pointer"
        >
          Salvar produto
        </button>
      </div>
    </form>
  </div>
</div>
