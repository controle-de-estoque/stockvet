<div class="flex flex-col w-full md:max-w-[80%] mx-auto gap-12 p-4 md:p-0">
	<app-navbar></app-navbar>

	<div class="w-full bg-white rounded-lg shadow-sm p-6 sm:p-10 border border-gray-100">
		<h2 class="text-2xl font-bold text-gray-900 mb-8">Cadastrar usuario</h2>

		<form class="space-y-6" (ngSubmit)="cadastrarUsuario()">
			<div>
				<label for="firstName" class="block text-sm font-semibold text-gray-900 mb-2">Nome</label>
				<input
					type="text"
					id="firstName"
					name="firstName"
					[(ngModel)]="firstName"
					placeholder="Digite aqui o nome do usuario"
					class="w-full border border-gray-800 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
					required
				>
			</div>

			<div>
				<label for="lastName" class="block text-sm font-semibold text-gray-900 mb-2">Sobrenome</label>
				<input
					type="text"
					id="lastName"
					name="lastName"
					[(ngModel)]="lastName"
					placeholder="Digite aqui o sobrenome do usuario"
					class="w-full border border-gray-800 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
					required
				>
			</div>

			<div>
				<label for="email" class="block text-sm font-semibold text-gray-900 mb-2">E-mail</label>
				<input
					type="email"
					id="email"
					name="email"
					[(ngModel)]="email"
					placeholder="Digite aqui o email do usuario"
					class="w-full border border-gray-800 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
					required
				>
			</div>

			<div>
				<label for="password" class="block text-sm font-semibold text-gray-900 mb-2">Senha</label>
				<input
					type="password"
					id="password"
					name="password"
					[(ngModel)]="password"
					placeholder="Digite aqui a senha do usuario"
					class="w-full border border-gray-800 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
					required
				>
			</div>

			<div>
				<label for="firstPetName" class="block text-sm font-semibold text-gray-900 mb-2">Nome do pet</label>
				<input
					type="text"
					id="firstPetName"
					name="firstPetName"
					[(ngModel)]="firstPetName"
					placeholder="Digite aqui o nome do primeiro pet"
					class="w-full border border-gray-800 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
					required
				>
			</div>

			<div class="flex flex-col sm:flex-row gap-4 pt-6">
				<a
					routerLink="/admin"
					class="flex-1 px-6 py-3 bg-white border border-gray-800 text-gray-700 font-semibold rounded-md hover:bg-gray-50 transition-colors text-center"
				>
					Voltar
				</a>
				<button
					type="submit"
					class="flex-1 px-6 py-3 bg-indigo-600 text-white font-semibold rounded-md hover:bg-indigo-700 shadow-sm transition-colors"
				>
					Cadastrar usuario
				</button>
			</div>
		</form>
	</div>
</div>
