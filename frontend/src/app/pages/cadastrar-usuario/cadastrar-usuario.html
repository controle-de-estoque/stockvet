<div class="flex flex-col w-full md:max-w-[80%] mx-auto gap-12 p-4 md:p-0">
	<app-navbar></app-navbar>

	<div class="w-full bg-white rounded-lg shadow-sm p-6 sm:p-10 border border-gray-100">
		<h2 class="text-2xl font-bold text-gray-900 mb-8">Cadastrar usuario</h2>

		<form class="space-y-6">
			<div>
				<label for="nome" class="block text-sm font-semibold text-gray-900 mb-2">Nome</label>
				<input
					type="text"
					id="nome"
					placeholder="Digite aqui o nome do usuario"
					class="w-full border border-gray-800 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
					required
				>
			</div>

			<div>
				<label for="sobrenome" class="block text-sm font-semibold text-gray-900 mb-2">Sobrenome</label>
				<input
					type="text"
					id="sobrenome"
					placeholder="Digite aqui o sobrenome do usuario"
					class="w-full border border-gray-800 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
					required
				>
			</div>

			<div>
				<label for="email" class="block text-sm font-semibold text-gray-900 mb-2">E-mail</label>
				<input
					type="email"
					id="email"
					placeholder="Digite aqui o email do usuario"
					class="w-full border border-gray-800 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
					required
				>
			</div>

			<div>
				<h3 class="text-sm font-semibold text-gray-900 mb-3">Permissoes</h3>
				<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
					<label class="flex items-center gap-2 text-sm text-gray-700">
						<input type="checkbox" class="w-4 h-4 text-indigo-600 border-gray-800 rounded focus:ring-indigo-500" />
						Cadastrar usuarios
					</label>
					<label class="flex items-center gap-2 text-sm text-gray-700">
						<input type="checkbox" class="w-4 h-4 text-indigo-600 border-gray-800 rounded focus:ring-indigo-500" />
						Editar usuarios
					</label>
					<label class="flex items-center gap-2 text-sm text-gray-700">
						<input type="checkbox" class="w-4 h-4 text-indigo-600 border-gray-800 rounded focus:ring-indigo-500" />
						Desativar usuarios
					</label>

					<label class="flex items-center gap-2 text-sm text-gray-700">
						<input type="checkbox" class="w-4 h-4 text-indigo-600 border-gray-800 rounded focus:ring-indigo-500" />
						Cadastrar produtos
					</label>
					<label class="flex items-center gap-2 text-sm text-gray-700">
						<input type="checkbox" class="w-4 h-4 text-indigo-600 border-gray-800 rounded focus:ring-indigo-500" />
						Editar produtos
					</label>
					<label class="flex items-center gap-2 text-sm text-gray-700">
						<input type="checkbox" class="w-4 h-4 text-indigo-600 border-gray-800 rounded focus:ring-indigo-500" />
						Desativar produtos
					</label>

					<label class="flex items-center gap-2 text-sm text-gray-700">
						<input type="checkbox" class="w-4 h-4 text-indigo-600 border-gray-800 rounded focus:ring-indigo-500" />
						Cadastrar procedimentos
					</label>
					<label class="flex items-center gap-2 text-sm text-gray-700">
						<input type="checkbox" class="w-4 h-4 text-indigo-600 border-gray-800 rounded focus:ring-indigo-500" />
						Editar procedimentos
					</label>
					<label class="flex items-center gap-2 text-sm text-gray-700">
						<input type="checkbox" class="w-4 h-4 text-indigo-600 border-gray-800 rounded focus:ring-indigo-500" />
						Desativar procedimentos
					</label>

					<label class="flex items-center gap-2 text-sm text-gray-700">
						<input type="checkbox" class="w-4 h-4 text-indigo-600 border-gray-800 rounded focus:ring-indigo-500" />
						Cadastrar cessionarios
					</label>
					<label class="flex items-center gap-2 text-sm text-gray-700">
						<input type="checkbox" class="w-4 h-4 text-indigo-600 border-gray-800 rounded focus:ring-indigo-500" />
						Editar cessionarios
					</label>
					<label class="flex items-center gap-2 text-sm text-gray-700">
						<input type="checkbox" class="w-4 h-4 text-indigo-600 border-gray-800 rounded focus:ring-indigo-500" />
						Desativar cessionarios
					</label>

					<label class="flex items-center gap-2 text-sm text-gray-700">
						<input type="checkbox" class="w-4 h-4 text-indigo-600 border-gray-800 rounded focus:ring-indigo-500" />
						Cadastrar movimentacao
					</label>
					<label class="flex items-center gap-2 text-sm text-gray-700">
						<input type="checkbox" class="w-4 h-4 text-indigo-600 border-gray-800 rounded focus:ring-indigo-500" />
						Gerar relatorios
					</label>
				</div>
			</div>

			<div class="flex flex-col sm:flex-row gap-4 pt-6">
				<a
					routerLink="/admin"
					class="flex-1 px-6 py-3 bg-white border border-gray-800 text-gray-700 font-semibold rounded-md hover:bg-gray-50 transition-colors text-center"
				>
					Voltar
				</a>
				<button
					type="submit"
					class="flex-1 px-6 py-3 bg-indigo-600 text-white font-semibold rounded-md hover:bg-indigo-700 shadow-sm transition-colors"
				>
					Cadastrar usuario
				</button>
			</div>
		</form>
	</div>
</div>
