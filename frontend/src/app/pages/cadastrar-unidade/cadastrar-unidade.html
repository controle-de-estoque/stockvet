<div class="flex flex-col w-full md:max-w-[80%] mx-auto gap-12 p-4 md:p-0">
  <app-navbar></app-navbar>

  <div class="w-full bg-white rounded-lg shadow-sm p-6 sm:p-10 border border-gray-100">
    <h2 class="text-2xl font-bold text-gray-900 mb-8">Cadastrar unidade de consumo</h2>

    <form class="space-y-6" (ngSubmit)="cadastrar()">

      <div>
        <label for="nome" class="block text-sm font-semibold text-gray-900 mb-2">Nome</label>
        <input
          type="text"
          id="nome"
          name="nome"
          [(ngModel)]="nome"
          placeholder="Digite aqui o nome da unidade ..."
          class="w-full border border-gray-800 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
          required
        >
      </div>

      <div>
        <label for="quantidade_minima" class="block text-sm font-semibold text-gray-900 mb-2">Quantidade mínima de consumo</label>
        <input
          type="number"
          id="quantidade_minima"
          name="consumoMinimo"
          [(ngModel)]="consumoMinimo"
          min="1"
          step="1"
          placeholder="Digite aqui a quantidade mínima ..."
          class="w-full border border-gray-800 rounded-md px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
          required
        >
      </div>

      <div class="flex flex-col sm:flex-row gap-4 pt-4">
        <button
          type="button"
          class="flex-1 px-6 py-3 bg-gray-100 text-gray-700 font-semibold rounded-md hover:bg-gray-200 transition-colors hover:cursor-pointer"
          routerLink="/cadastrar-produtos"
        >
          Voltar
        </button>
        <button
          type="submit"
          class="flex-1 px-6 py-3 bg-indigo-600 text-white font-semibold rounded-md hover:bg-indigo-700 shadow-sm transition-colors hover:cursor-pointer"
        >
          Cadastrar unidade
        </button>
      </div>

    </form>
  </div>
</div>
