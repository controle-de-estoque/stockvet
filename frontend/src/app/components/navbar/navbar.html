<div class="flex flex-col w-full m-auto bg-white rounded-md shadow my-4">
  <div class="flex flex-row justify-between items-center pl-4 pr-4 md:pr-8">
    <div class="flex flex-row items-center">
      <img src="logo-stockvet.png" alt="" class="h-16 md:h-20 object-cover">
      <h1 class="font-semibold text-xl md:text-2xl">StockVet</h1>
    </div>

    <div class="flex items-center gap-4">
      <button type="button" (click)="toggleMenu()" class="md:hidden text-gray-800 hover:text-blue-500 transition-colors">
        <i class="fa-solid" [class.fa-bars]="!isMenuOpen" [class.fa-xmark]="isMenuOpen" style="font-size: 24px; display: block;"></i>
        <span class="sr-only">Menu</span>
      </button>

      <button type="button" (click)="logout()" class="hidden md:flex flex-row items-center gap-1 hover:cursor-pointer">
        <i class="fa-solid fa-arrow-right-from-bracket text-red-500 text-xl"></i>
      </button>
    </div>
  </div>

  <ul
    [class.hidden]="!isMenuOpen"
    [class.flex]="isMenuOpen"
    class="md:flex md:flex-row flex-col justify-between px-8 py-2 border-t border-[#EEE5E9] transition-all duration-300 ease-in-out">
    <li routerLinkActive="text-blue-500" class="py-2 md:py-0 hover:border-b-2 md:hover:border-b-0 border-blue-500 hover:cursor-pointer hover:text-blue-500 transition duration-300">
      <a routerLink="/produtos" class="block w-full text-left">Produtos</a>
    </li>
    <li routerLinkActive="text-blue-500" class="py-2 md:py-0 hover:border-b-2 md:hover:border-b-0 border-blue-500 hover:cursor-pointer hover:text-blue-500 transition duration-300">
      <a routerLink="/movimentacoes" class="block w-full text-left">Movimentações</a>
    </li>
    <li routerLinkActive="text-blue-500" class="py-2 md:py-0 hover:border-b-2 md:hover:border-b-0 border-blue-500 hover:cursor-pointer hover:text-blue-500 transition duration-300">
      <a routerLink="/relatorios" class="block w-full text-left">Relatórios</a>
    </li>
    <li routerLinkActive="text-blue-500" class="py-2 md:py-0 hover:border-b-2 md:hover:border-b-0 border-blue-500 hover:cursor-pointer hover:text-blue-500 transition duration-300">
      <a routerLink="/procedimentos" class="block w-full text-left">Procedimentos</a>
    </li>
    <li routerLinkActive="text-blue-500" class="py-2 md:py-0 hover:border-b-2 md:hover:border-b-0 border-blue-500 hover:cursor-pointer hover:text-blue-500 transition duration-300">
      <a routerLink="/admin" class="block w-full text-left">Admin</a>
    </li>
    <li class="md:hidden py-2 md:py-0 hover:border-b-2 md:hover:border-b-0 border-blue-500 hover:cursor-pointer hover:text-red-500 transition duration-300">
      <button (click)="logout()" class="block w-full text-left">Sair</button>
    </li>
  </ul>
</div>
