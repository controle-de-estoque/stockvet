services:
  db:
    image: postgres:16-alpine
    container_name: stockvet-db
    ports:
      - 5000:5432
    environment:
      - POSTGRES_USER=stockvet
      - POSTGRES_PASSWORD=stockvet
      - POSTGRES_DB=stockvet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockvet -d stockvet"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockvet-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/stockvet
      SPRING_DATASOURCE_USERNAME: stockvet
      SPRING_DATASOURCE_PASSWORD: stockvet
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      JWT_SEGREDO: stockvet-secret-dev
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stockvet-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
